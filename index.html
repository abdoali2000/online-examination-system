<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="theme-purple">

    <div class="login container d-flex justify-content-center align-items-center vh-100">

        <div class="card p-4 shadow " style="width:90%">

            <h3 class="text-center mb-4 fw-bold fs-1">Login</h3>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" oninput="validateEmail()" id="email" class="form-control p-3" placeholder="Enter email">
                    <div class="check" id="error_email"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" oninput="validatePassword()" id="password" class="form-control p-3" placeholder="Enter password">
                    <div class="form-check mt-1">
                        <input class="form-check-input" type="checkbox" id="showPasswordToggle">
                        <label class="form-check-label" for="showPasswordToggle" style="font-size: 14px !important; color: var(--text-muted);">Show Password</label>
                    </div>
                    <div class="check" id="error_pass"></div>
                </div>
                <button type="submit" id="subimt" class="btn btn-primary w-100 my-1">Login</button>
                <hr>
                <p class="text-center my-3">
                    Don't have an account? <a href="register.html">Register</a>
                </p>
                <div class="text-center" style="margin-top: 2rem;">
                    <a href="admin.html" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: none;">⚙️ Admin Dashboard</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>

</html>
